name: eta-mu-review-gate

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: eta-mu-review-gate-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync-eta-mu-review-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve eta-mu logic ref
        id: eta_mu_ref
        shell: bash
        env:
          ETA_MU_GITHUB_REF_MAIN: ${{ vars.ETA_MU_GITHUB_REF_MAIN }}
          ETA_MU_GITHUB_REF_STAGING: ${{ vars.ETA_MU_GITHUB_REF_STAGING }}
        run: |
          target_branch="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == pull_request* ]]; then
            target_branch="${GITHUB_BASE_REF}"
          fi

          logic_ref="${ETA_MU_GITHUB_REF_MAIN:-main}"
          if [[ "$target_branch" == "staging" ]]; then
            logic_ref="${ETA_MU_GITHUB_REF_STAGING:-staging}"
          fi

          echo "logic_ref=${logic_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout eta-mu logic
        uses: actions/checkout@v4
        with:
          repository: open-hax/eta-mu-github
          path: .eta-mu
          ref: ${{ steps.eta_mu_ref.outputs.logic_ref }}

      - name: Create eta-mu app token
        id: eta_mu_token
        if: ${{ secrets.ETA_MU_APP_ID != '' && secrets.ETA_MU_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ETA_MU_APP_ID }}
          private-key: ${{ secrets.ETA_MU_APP_PRIVATE_KEY }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .eta-mu/pnpm-lock.yaml

      - name: Install eta-mu dependencies
        run: pnpm --dir .eta-mu install --frozen-lockfile

      - name: Publish eta-mu review gate status
        env:
          GITHUB_TOKEN: ${{ steps.eta_mu_token.outputs.token != '' && steps.eta_mu_token.outputs.token || github.token }}
          ETA_MU_REVIEW_ACTORS: ${{ vars.ETA_MU_REVIEW_ACTORS }}
          ETA_MU_REVIEW_CHECK_NAME: ${{ vars.ETA_MU_REVIEW_CHECK_NAME }}
        run: >-
          pnpm --dir .eta-mu dev review-gate
          --repo "${GITHUB_REPOSITORY}"
          --pr "${{ github.event.pull_request.number }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --publish-check
