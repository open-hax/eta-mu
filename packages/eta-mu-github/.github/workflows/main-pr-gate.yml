name: main-pr-gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  main-test:
    name: main-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  main-build:
    name: main-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  staging-promotion-gate:
    name: staging-promotion-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git fetch origin staging --depth=1
      - run: git merge-base --is-ancestor "${PR_HEAD_SHA}" origin/staging
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}